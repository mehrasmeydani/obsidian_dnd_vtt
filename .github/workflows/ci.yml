# Regression gate: typecheck, full test suite, and production bundle on every
# push/PR. Mirrors what `docker compose run --rm test` / `build` do locally.
name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build # includes tsc --noEmit
