name: Bug report
description: Something broke in Obsidian or in a build.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you saw vs. what you expected.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: Obsidian version, plugin build/commit, OS.
    validations:
      required: false
